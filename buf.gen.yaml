version: v2
clean: true
managed:
  enabled: true
inputs:
  - zip_archive: https://github.com/googleapis/googleapis/archive/refs/heads/master.zip
    strip_components: 1
    paths:
      - google/pubsub/v1
plugins:
  - local: protoc-gen-elixir
    out: lib/broadway_cloud_pub_sub/proto
    opt:
      - paths=source_relative
      - include_docs=true
      - plugins=grpc
